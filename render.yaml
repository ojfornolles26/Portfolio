services:
  - type: static
    name: orlandofornollesjr
    buildCommand: npm run build
    publishPath: out
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https://ojworks.netlify.app; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000; includeSubDomains; preload"
      - path: /*
        name: X-Frame-Options
        value: "DENY"
      - path: /*
        name: X-Content-Type-Options
        value: "nosniff"
      - path: /*
        name: Referrer-Policy
        value: "strict-origin-when-cross-origin"
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
